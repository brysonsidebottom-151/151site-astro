faqs:
  heading: "Frequently Asked Questions"
  items:
    - question: "What is 151 Coffee?"
      answer: "151 Coffee is a fast drive-thru coffee concept serving handcrafted espresso, cold brew, and blended energy drinks across Texas and Kansas. Founded in 2017 by Mark Wattles, we live by one motto: It's a good day to have a good day."
    - question: "Where is 151 Coffee located?"
      answer: "We currently have 15+ locations across the Dallas-Fort Worth metro in Texas and in Lawrence, Manhattan, and Overland Park, Kansas. Use the locator on our homepage or visit the Locations page to find the nearest store."
    - question: "What does 151 Coffee serve?"
      answer: "Our menu includes espresso drinks, cold brew, blended energy drinks, dirty sodas (Dirty Pops), refreshers, smoothies, teas, kids drinks, hot food items like burritos and bagels, and baked treats. With over 43,000 flavor combinations, there's something for everyone."
    - question: "Does 151 Coffee have a drive-thru?"
      answer: "Yes - every 151 Coffee location is a drive-thru concept. Speed and convenience are central to what we do. Our dual-lane drive-thru design and outdoor order-takers help us move fast even during peak hours."
    - question: "Does 151 Coffee sell gift cards?"
      answer: "Yes! You can purchase and check gift card balances using the Gift Card button at the top of the page."
    - question: "Is 151 Coffee hiring?"
      answer: "Always. Visit our Careers page to see current openings. We look for people who are energetic, positive, and passionate about great customer experiences."

