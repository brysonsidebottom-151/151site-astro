type: PagePrivacy
seo:
  title: "Privacy Policy | 151 Coffee"
  description: "151 Coffee privacy policy - how we collect, use, and protect your information."
  ogImage: "https://www.151coffee.com/images/splash1.jpg"
hero:
  heading: "Privacy Policy"
  subheading: "Last updated: June 2025"
sections:
  - heading: "Information We Collect"
    body: "We collect information you provide directly to us, such as when you contact us through our website, sign up for communications, or submit a form. This may include your name, email address, phone number, and message content."
  - heading: "How We Use Your Information"
    body: "We use the information we collect to respond to your inquiries, send you updates and promotional materials (with your consent), improve our website and services, and comply with legal obligations."
  - heading: "Information Sharing"
    body: "We do not sell, trade, or otherwise transfer your personal information to third parties without your consent, except as required by law or to trusted partners who assist us in operating our website and conducting our business."
  - heading: "Cookies"
    body: "Our website uses cookies to enhance your browsing experience. You may choose to disable cookies through your browser settings, though this may affect certain features of our site."
  - heading: "Third-Party Services"
    body: "Our website may contain links to third-party websites. We are not responsible for the privacy practices of those sites and encourage you to review their privacy policies."
  - heading: "Data Security"
    body: "We implement reasonable security measures to protect your personal information. However, no method of transmission over the Internet is 100% secure."
  - heading: "Children's Privacy"
    body: "Our website is not directed to children under 13. We do not knowingly collect personal information from children under 13."
  - heading: "Contact Us"
    body: "If you have questions about this Privacy Policy, please contact us at Contact@151Coffee.com."
